<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where are you?</title>
  <meta name="description" content="Displays the city nearest to your current IP address.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://n7h.io/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://n7h.io/">
  <meta property="og:title" content="Where are you?">
  <meta property="og:description" content="Displays the city nearest to your current IP address.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0f0f0;
      --muted: #555;
      --toggle-bg: #222;
      --toggle-active: #f0f0f0;
      --toggle-active-fg: #0a0a0a;
      --toggle-fg: #666;
    }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --fg: #0a0a0a;
      --muted: #888;
      --toggle-bg: #e0e0e0;
      --toggle-active: #0a0a0a;
      --toggle-active-fg: #f5f5f5;
      --toggle-fg: #999;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Georgia', serif;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    #city {
      font-size: clamp(2.5rem, 10vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
      padding: 0 1rem;
    }

    #city.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #status {
      margin-top: 1.2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
    }

    #status.visible { opacity: 1; }

    #theme-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 2px;
      background: var(--toggle-bg);
      border-radius: 999px;
      padding: 3px;
      transition: background 0.3s ease;
    }

    #theme-toggle button {
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
      color: var(--toggle-fg);
      transition: background 0.2s ease, color 0.2s ease;
      line-height: 1;
    }

    #theme-toggle button.active {
      background: var(--toggle-active);
      color: var(--toggle-active-fg);
    }
  </style>
</head>
<body>
  <div id="city"></div>
  <div id="status"></div>

  <div id="theme-toggle">
    <button data-mode="light">LIGHT</button>
    <button data-mode="system">AUTO</button>
    <button data-mode="dark">DARK</button>
  </div>

  <script>
    const cityEl  = document.getElementById('city');
    const statusEl = document.getElementById('status');

    // --- Theme ---
    const STORAGE_KEY = 'theme-mode';
    const systemDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

    function applyTheme(mode) {
      const resolved = mode === 'system' ? (systemDark() ? 'dark' : 'light') : mode;
      document.documentElement.setAttribute('data-theme', resolved);
      document.querySelectorAll('#theme-toggle button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
    }

    let currentMode = localStorage.getItem(STORAGE_KEY) || 'system';
    applyTheme(currentMode);

    document.getElementById('theme-toggle').addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      currentMode = btn.dataset.mode;
      localStorage.setItem(STORAGE_KEY, currentMode);
      applyTheme(currentMode);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (currentMode === 'system') applyTheme('system');
    });

    // --- Geolocation ---
    function show(city, label) {
      cityEl.textContent  = city;
      statusEl.textContent = label || '';
      requestAnimationFrame(() => {
        cityEl.classList.add('visible');
        statusEl.classList.add('visible');
      });
    }

    async function locate() {
      const apis = [
        {
          url: 'https://ipwho.is/',
          parse: d => d.success && d.city ? [d.city, d.country] : null,
        },
        {
          url: 'https://ipapi.co/json/',
          parse: d => !d.error && d.city ? [d.city, d.country_name] : null,
        },
        {
          url: 'https://freeipapi.com/api/json',
          parse: d => d.cityName ? [d.cityName, d.countryName] : null,
        },
      ];

      for (const api of apis) {
        try {
          const r = await fetch(api.url);
          const d = await r.json();
          const result = api.parse(d);
          if (result) { show(...result); return; }
        } catch (_) {}
      }

      show('Unknown', 'location unavailable');
    }

    locate();
  </script>
</body>
</html>
