<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where are you?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    #city {
      font-size: clamp(2.5rem, 10vw, 7rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      text-align: center;
      padding: 0 1rem;
    }

    #city.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #status {
      margin-top: 1.2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: #555;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
    }

    #status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="city"></div>
  <div id="status"></div>

  <script>
    const cityEl  = document.getElementById('city');
    const statusEl = document.getElementById('status');

    function show(city, label) {
      cityEl.textContent  = city;
      statusEl.textContent = label || '';
      requestAnimationFrame(() => {
        cityEl.classList.add('visible');
        statusEl.classList.add('visible');
      });
    }

    async function locate() {
      const apis = [
        {
          url: 'https://ipwho.is/',
          parse: d => d.success && d.city ? [d.city, d.country] : null,
        },
        {
          url: 'https://ipapi.co/json/',
          parse: d => !d.error && d.city ? [d.city, d.country_name] : null,
        },
        {
          url: 'https://freeipapi.com/api/json',
          parse: d => d.cityName ? [d.cityName, d.countryName] : null,
        },
      ];

      for (const api of apis) {
        try {
          const r = await fetch(api.url);
          const d = await r.json();
          const result = api.parse(d);
          if (result) { show(...result); return; }
        } catch (_) {}
      }

      show('Unknown', 'location unavailable');
    }

    locate();
  </script>
</body>
</html>
